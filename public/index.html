<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vibe Games HQ Dashboard - Real-time statistics and analytics for all Vibe games.">
    <meta name="keywords" content="vibe games, dashboard, analytics, statistics, tracking">
    <title>Vibe Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <span class="icon">🚀</span>
                    <h1>Vibe Games HQ</h1>
                </div>
                <div class="header-actions">
                    <div class="status-indicator">
                        <span class="pulse"></span>
                        Live Data
                    </div>
                    <button id="logout-btn" class="logout-btn" title="Secure Logout">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
            <p class="subtitle">Real-time usage statistics and player engagement for all Vibe games.</p>
        </header>

        <main>
            <div class="global-trajectory hidden-element" id="chart-section">
                <h2>Global Trajectory (30 Days)</h2>
                <div class="chart-wrapper">
                    <canvas id="trafficChart"></canvas>
                </div>
            </div>

            <div class="stats-grid" id="stats-grid">
                <!-- Data will be injected here -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Fetching latest intel...</p>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
